        .pos-prep { background:#9c27b0; }

        .word-meaning { font-size:1.2em; color:#444; margin-bottom:15px; line-height:1.8; }
        .word-collocation { background:#f5f5f5; padding:12px; border-radius:8px; margin-bottom:18px; font-size:1em; }
        .word-example { background:#e3f2fd; padding:18px; border-radius:10px; margin-top:18px; border-left:4px solid #2196f3; }

        .option-button { display:block; width:100%; text-align:left; background:white; color:#333; border:2px solid #ddd; padding:12px 18px; border-radius:10px; cursor:pointer; font-size:1.05em; transition:all 0.3s; margin-bottom:10px; }

        // ========== 主程序 ==========
        var currentIndex = 0;
        var currentWord = null;
        var isAnswered = false;
        var stats = { mastered: 0, learning: vocabularyList.length };
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('✅ 页面加载完成');
            console.log('   词汇数量：', vocabularyList.length);
            loadWord();
        });
        
        // 加载单词
        function loadWord() {
            if (currentIndex >= vocabularyList.length) {
                document.getElementById('wordCard').innerHTML = '<h2 style="text-align:center; color:#667eea;">🎉 本单元学习完毕！</h2>';
                return;
            }
            
            currentWord = vocabularyList[currentIndex];
            console.log('📖 当前词：', currentWord.word);
            
            // 更新界面
            document.getElementById('wordText').textContent = currentWord.word;
            document.querySelector('.phonetic-text').textContent = currentWord.phonetic || '[音标待补充]';
            
            // 词性标签
            var posClass = 'pos-default';
            if (currentWord.pos === 'n.') posClass = 'pos-noun';
            else if (currentWord.pos === 'v.') posClass = 'pos-verb';
            else if (currentWord.pos === 'adj.') posClass = 'pos-adj';
            else if (currentWord.pos === 'adv.') posClass = 'pos-adv';
            else if (currentWord.pos === 'prep.') posClass = 'pos-prep';
            
            document.getElementById('meaningText').innerHTML = 
                '<span class="pos-tag ' + posClass + '">' + currentWord.pos + '</span>' + currentWord.meaning;
            
            document.getElementById('collocationText').innerHTML = 
                '<strong>常用搭配：</strong>' + (currentWord.collocation || '待补充');
            
            // 例句
            if (currentWord.example && currentWord.example !== '') {
                document.getElementById('exampleSentence').textContent = currentWord.example;
                document.getElementById('exampleTranslation').textContent = currentWord.example_cn || '';
            } else {
                document.getElementById('exampleSentence').textContent = '[暂无例句]';
                document.getElementById('exampleTranslation').textContent = '';
            }
            
            // 生成选项
            generateOptions();
            
            // 重置状态
            isAnswered = false;
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            
            // 更新进度
            updateProgress();
        }
        
        // 生成选项
        function generateOptions() {
            var container = document.getElementById('optionsContainer');
            
            // 随机选3个错误答案
            var wrongWords = vocabularyList
                .filter(function(w) { return w.word !== currentWord.word; })
                .sort(function() { return Math.random() - 0.5; })
                .slice(0, 3);
            
            var allOptions = [currentWord].concat(wrongWords);
            var shuffled = allOptions.sort(function() { return Math.random() - 0.5; });
            
            container.innerHTML = '';
            for (var i = 0; i < shuffled.length; i++) {
                var btn = document.createElement('button');
                btn.className = 'option-button';
                btn.innerHTML = '<strong>' + String.fromCharCode(65+i) + '.</strong> ' + shuffled[i].meaning;
                btn.onclick = (function(correct, btnEl) {
                    return function() {
                        checkAnswer(correct, btnEl);
                    };
                })(shuffled[i].word === currentWord.word, btn);
                container.appendChild(btn);
            }
        }
        
        // 检查答案
        function checkAnswer(isCorrect, buttonElement) {
            if (isAnswered) return;
            
            var feedback = document.getElementById('feedback');
            isAnswered = true;
            
            // 禁用所有选项
            var buttons = document.querySelectorAll('.option-button');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].disabled = true;
            }
            
            if (isCorrect) {
                feedback.textContent = '✅ 正确！太棒了！';
                feedback.className = 'feedback correct';
                buttonElement.classList.add('correct');
                stats.mastered++;
                stats.learning--;
            } else {
                feedback.textContent = '❌ 不对，正确答案是"' + currentWord.meaning + '"';
                feedback.className = 'feedback incorrect';
                buttonElement.classList.add('incorrect');
                
                // 高亮正确答案
                for (var i = 0; i < buttons.length; i++) {
                    if (buttons[i].textContent.indexOf(currentWord.meaning) !== -1) {
                        buttons[i].classList.add('correct');
                    }
                }
            }
            
            feedback.style.display = 'block';
            document.getElementById('nextBtn').style.display = 'inline-block';
            
            updateProgress();
        }
        
        // 下一个词
        function nextWord() {
            currentIndex++;
            loadWord();
        }
        
        // 更新进度
        function updateProgress() {
            document.getElementById('progressText').textContent = 
                '已掌握：' + stats.mastered + ' | 待学：' + stats.learning;
        }
        
        // TTS发音
        function playTTS() {
            if ('speechSynthesis' in window) {
                var utterance = new SpeechSynthesisUtterance(currentWord.word);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                speechSynthesis.speak(utterance);
            }
        }
